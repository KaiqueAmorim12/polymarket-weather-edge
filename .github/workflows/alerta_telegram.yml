name: WeatherEdge - Alerta Telegram

on:
  schedule:
    # Rodar a cada hora para verificar alertas (1h antes do pico = ~13h local de cada cidade)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alerta:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: pip install httpx

      - name: Verificar e enviar alertas Telegram
        run: python alerta_telegram.py
