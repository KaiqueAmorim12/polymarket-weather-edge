name: WeatherEdge - Limpeza 30d

on:
  schedule:
    - cron: '0 4 * * *'  # 4h UTC = 1h BRT
  workflow_dispatch:

permissions:
  contents: read

jobs:
  limpeza:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install httpx
      - run: python limpar_antigos.py
