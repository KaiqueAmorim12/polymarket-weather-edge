name: WeatherEdge - Coleta Modelos

on:
  schedule:
    # Rodar a cada hora — modelos meteorologicos atualizam a cada 6h
    # mas coletando a cada 1h garante previsao mais recente possivel
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  modelos:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: pip install httpx

      - name: Coletar previsoes dos 6 modelos
        run: python coletar_modelos.py
