name: WeatherEdge - Coleta Diaria

on:
  schedule:
    # 21:00 UTC = 18:00 BRT
    - cron: '0 21 * * *'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  coleta:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Criar .env com secrets
        run: |
          echo "OPENWEATHERMAP_API_KEY=${{ secrets.OPENWEATHERMAP_API_KEY }}" >> .env
          echo "ACCUWEATHER_API_KEY=${{ secrets.ACCUWEATHER_API_KEY }}" >> .env
          echo "VISUAL_CROSSING_API_KEY=${{ secrets.VISUAL_CROSSING_API_KEY }}" >> .env

      - name: Rodar ciclo de coleta
        run: python agendar.py --agora

      - name: Exportar resultados pra JSON
        run: python exportar_json.py

      - name: Commit e push dos resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/ dados/
          git diff --staged --quiet || git commit -m "dados: coleta diaria $(date -u +%Y-%m-%d)"
          git push
