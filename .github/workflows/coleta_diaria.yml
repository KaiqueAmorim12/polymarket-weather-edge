name: WeatherEdge - Coleta

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coleta:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar ciclo de coleta
        run: python agendar.py --agora

      - name: Exportar resultados
        run: python exportar_json.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/ dados/
          git diff --staged --quiet || git commit -m "dados: coleta $(date -u +%Y-%m-%d_%H%M)"
          git push
